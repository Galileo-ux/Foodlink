<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMida - Donar Alimentos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="contenedor contenedor-formulario">
        <header class="cabecera animar-bajar">
            <h1>📦 Registrar Donación</h1>
            <p class="subtitulo">Llena los datos para que un voluntario pase a recoger los alimentos.</p>
        </header>

        <section class="tarjeta animar-subir delay-1">
            <form id="form-donacion" class="formulario-donacion" method="POST" action="/donar">
                

                <div class="grupo-input">
                    <label for="nombre">Nombre del Establecimiento:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej. Panadería El Buen Pan" required>
                </div>

                <div class="grupo-input">
                    <label for="direccion">Dirección del Establecimiento:</label>
                    <input type="text" id="direccion" name="direccion" placeholder="Ej. Calle Principal 123" required>
                </div>

                <div class="grupo-input">
                    <label for="descripcion">¿Qué alimentos vas a donar?</label>
                    <input type="text" id="descripcion" name="descripcion" placeholder="Ej.pan dulce" required>
                </div>

                <div class="grupo-input">
                    <label for="tipo_institucion">Tipo de institución:</label>
                    <select id="tipo_institucion" name="tipo_institucion" required>
                        <option value="">Selecciona una opción</option>
                        <option value="comida_rapida">Comida rápida</option>
                        <option value="restaurante">Restaurante</option>
                        <option value="cuenta_propia">Cuenta propia</option>
                        <option value="supermercado">Supermercado</option>
                        <option value="panaderia">Panadería</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>

                <div class="grupo-input">
                    <label for="peso">Peso estimado (Kilogramos) o unidades del producto:</label>
                    <input type="number" id="peso" name="peso" step="0.5" placeholder="Ej. 15.5" required>
                </div>

                <div class="grupo-input">
                    <label for="contenedor">¿Los alimentos vienen en contenedor?</label>
                    <select id="contenedor" name="contenedor" required>
                        <option value="">Selecciona una opción</option>
                        <option value="Sí">Sí</option>
                        <option value="No">No</option>
                    </select>   
                </div>

                <div class="grupo-input">
                    <label for="temperatura">¿Son alimentos refrigerados?</label>
                    <select id="temperatura" name="temperatura" required>
                        <option value="">Selecciona una opción</option>
                        <option value="Sí">Sí</option>
                        <option value="No">No</option>
                    </select>   
                </div>                

                <div class="accion delay-2 animar-subir" style="margin-top: 20px;">
                    <button type="submit" class="boton-principal" style="width: 100%; border: none; cursor: pointer;">Enviar Información</button>
                </div>
            </form>
        </section>

        <div class="animar-subir delay-3 text-center">
            <a href="index.html" class="enlace-volver">← Volver al inicio</a>
        </div>
    </div>

    <script>
    document.getElementById('form-donacion').addEventListener('submit', function(e) {
        e.preventDefault();
        const datos = {
            nombre: document.getElementById('nombre').value,
            direccion: document.getElementById('direccion').value,
            descripcion: document.getElementById('descripcion').value,
            tipo_institucion: document.getElementById('tipo_institucion').value,
            peso: document.getElementById('peso').value,
            contenedor: document.getElementById('contenedor').value,
            temperatura: document.getElementById('temperatura').value
        };
        let donaciones = JSON.parse(localStorage.getItem('donaciones') || '[]');
        donaciones.push(datos);
        localStorage.setItem('donaciones', JSON.stringify(donaciones));
        window.location.href = 'listados.html';
    });
    </script>
</body>
</html>
